name: test

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 6

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux / GCC 14 ──
          - os: ubuntu-24.04
            compiler: gcc-14
            preset: dev-gcc

          # ── Linux / GCC 16 ──
          - os: ubuntu-24.04
            compiler: gcc-16
            preset: dev-gcc

          # ── Linux / Clang 18 ──
          - os: ubuntu-24.04
            compiler: clang-18
            preset: dev-clang

          # ── Linux / Clang 18 + libc++ ──
          - os: ubuntu-24.04
            compiler: clang-18+libc++
            preset: dev-clang-libcxx

          # ── Linux / Clang 22 ──
          - os: ubuntu-24.04
            compiler: clang-22
            preset: dev-clang

          # ── Linux / Clang 22 + libc++ ──
          - os: ubuntu-24.04
            compiler: clang-22+libc++
            preset: dev-clang-libcxx

          # ── Windows 2022 / MSVC 2022 ──
          - os: windows-2022
            compiler: msvc-2022
            preset: dev-msvc

          # ── Windows 2025 / MSVC 2026 ──
          - os: windows-2025-vs2026
            compiler: msvc-2026
            preset: dev-msvc

          # ── Windows 2025 / Clang-CL 20 ──
          - os: windows-2025-vs2026
            compiler: clang-cl-20
            preset: dev-clang-cl

    steps:
      - uses: actions/checkout@v5

      - name: Set up MSVC environment
        if: startsWith(matrix.compiler, 'msvc') || startsWith(matrix.compiler, 'clang-cl')
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
              -latest -property installationPath
          $vcvars = "$vsPath\VC\Auxiliary\Build\vcvars64.bat"
          cmd /c "`"$vcvars`" && set" | ForEach-Object {
            if ($_ -match '^([^=]+)=(.*)$') {
              "$($Matches[1])=$($Matches[2])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }

      - name: Set up APT package cache
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cache/apt/archives/partial
          echo "Dir::Cache::archives \"$HOME/.cache/apt/archives\";" \
            | sudo tee /etc/apt/apt.conf.d/99user-cache

      - name: Cache APT packages
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: ~/.cache/apt/archives
          key: apt-${{ matrix.os }}-${{ matrix.compiler }}-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: apt-${{ matrix.os }}-${{ matrix.compiler }}-

      - name: Install GCC 16
        if: matrix.compiler == 'gcc-16'
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update -q
          sudo apt-get install -y gcc-16 g++-16
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-16 100 \
                                   --slave /usr/bin/g++ g++ /usr/bin/g++-16

      - name: Install Clang 18
        if: startsWith(matrix.compiler, 'clang-18')
        run: |
          sudo update-alternatives --install /usr/bin/clang   clang   /usr/bin/clang-18   200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 200

      - name: Install libc++-18
        if: matrix.compiler == 'clang-18+libc++'
        run: |
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev

      - name: Install Clang 22 + libc++
        if: startsWith(matrix.compiler, 'clang-22')
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          sudo bash llvm.sh 22 all
          sudo update-alternatives --install /usr/bin/clang   clang   /usr/bin/clang-22   200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-22 200

      - name: Install Ninja
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Fix APT cache permissions
        if: always() && runner.os == 'Linux'
        run: sudo rm -rf ~/.cache/apt/archives/lock ~/.cache/apt/archives/partial

      - name: Check CMake Version
        run: cmake --version

      # -----------------------------------------------------------------------
      # Main project
      # -----------------------------------------------------------------------
      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -B build/${{ matrix.preset }}

      - name: Build (Debug)
        run: cmake --build build/${{ matrix.preset }} --config Debug

      - name: Test (Debug)
        run: ctest --test-dir build/${{ matrix.preset }} --build-config Debug
               --output-on-failure
               --no-compress-output
               --output-junit test-results-${{ matrix.compiler }}-debug.xml

      - name: Build (Release)
        run: cmake --build build/${{ matrix.preset }} --config Release

      - name: Test (Release)
        run: ctest --test-dir build/${{ matrix.preset }} --build-config Release
               --output-on-failure
               --no-compress-output
               --output-junit test-results-${{ matrix.compiler }}-release.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.compiler }}
          path: build/${{ matrix.preset }}/test-results-*.xml
          retention-days: 7

  coverage:
    name: ubuntu-24.04 / llvm-cov
    runs-on: ubuntu-24.04
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v5

      - name: Set up APT package cache
        run: |
          mkdir -p ~/.cache/apt/archives/partial
          echo "Dir::Cache::archives \"$HOME/.cache/apt/archives\";" \
            | sudo tee /etc/apt/apt.conf.d/99user-cache

      - name: Cache APT packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/apt/archives
          key: apt-ubuntu-24.04-clang-22-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: apt-ubuntu-24.04-clang-22-

      - name: Install Clang 22
        run: |
          wget -q https://apt.llvm.org/llvm.sh
          sudo bash llvm.sh 22 all
          sudo update-alternatives --install /usr/bin/clang   clang   /usr/bin/clang-22   200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-22 200

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Fix APT cache permissions
        if: always()
        run: sudo rm -rf ~/.cache/apt/archives/lock ~/.cache/apt/archives/partial

      - name: Configure (coverage)
        run: |
          cmake --preset dev-clang -B build/coverage \
            -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping" \
            -DCMAKE_EXE_LINKER_FLAGS="-fprofile-instr-generate"

      - name: Build
        run: cmake --build build/coverage --config Debug

      - name: Test
        run: |
          LLVM_PROFILE_FILE="${GITHUB_WORKSPACE}/build/coverage/cov-%p.profraw" \
            ctest --test-dir build/coverage --build-config Debug \
                  --output-on-failure --no-compress-output

      - name: Merge profile data
        run: |
          llvm-profdata-22 merge -sparse build/coverage/cov-*.profraw \
            -o build/coverage/coverage.profdata

      - name: Coverage report
        run: |
          mapfile -t objects < <(find build/coverage -path "*/Debug/*" -type f -perm /111)
          first="${objects[0]}"
          obj_args=()
          for o in "${objects[@]:1}"; do obj_args+=("-object=$o"); done
          llvm-cov-22 report "$first" "${obj_args[@]}" \
            -instr-profile=build/coverage/coverage.profdata \
            -use-color=false \
            src include/eggs 2>/dev/null

      - name: Generate HTML report
        run: |
          mapfile -t objects < <(find build/coverage -path "*/Debug/*" -type f -perm /111)
          first="${objects[0]}"
          obj_args=()
          for o in "${objects[@]:1}"; do obj_args+=("-object=$o"); done
          llvm-cov-22 show "$first" "${obj_args[@]}" \
            -instr-profile=build/coverage/coverage.profdata \
            -format=html \
            -output-dir=build/coverage/html \
            -show-line-counts-or-regions \
            src include/eggs 2>/dev/null

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: build/coverage/html/
          retention-days: 7

  coverage-gcov:
    name: ubuntu-24.04 / gcov
    runs-on: ubuntu-24.04
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v5

      - name: Set up APT package cache
        run: |
          mkdir -p ~/.cache/apt/archives/partial
          echo "Dir::Cache::archives \"$HOME/.cache/apt/archives\";" \
            | sudo tee /etc/apt/apt.conf.d/99user-cache

      - name: Cache APT packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/apt/archives
          key: apt-ubuntu-24.04-gcc-16-${{ hashFiles('.github/workflows/test.yml') }}
          restore-keys: apt-ubuntu-24.04-gcc-16-

      - name: Install GCC 16
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update -q
          sudo apt-get install -y gcc-16 g++-16 lcov
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-16 100 \
                                   --slave /usr/bin/g++ g++ /usr/bin/g++-16

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Fix APT cache permissions
        if: always()
        run: sudo rm -rf ~/.cache/apt/archives/lock ~/.cache/apt/archives/partial

      - name: Configure (coverage)
        run: |
          cmake --preset dev-gcc -B build/coverage-gcc \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build/coverage-gcc --config Debug

      - name: Test
        run: |
          find build/coverage-gcc -name "*.gcda" -delete
          ctest --test-dir build/coverage-gcc --build-config Debug \
                --output-on-failure --no-compress-output

      - name: Collect coverage
        run: |
          lcov --capture \
               --gcov-tool gcov-16 \
               --ignore-errors mismatch \
               --directory build/coverage-gcc \
               --output-file build/coverage-gcc/coverage.info
          lcov --remove build/coverage-gcc/coverage.info \
               '/usr/*' '*/build/*' \
               --ignore-errors unused \
               --output-file build/coverage-gcc/coverage.info

      - name: Coverage report
        run: lcov --summary build/coverage-gcc/coverage.info

      - name: Generate HTML report
        run: |
          genhtml build/coverage-gcc/coverage.info \
            --output-directory build/coverage-gcc/html \
            --quiet

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report-gcov
          path: build/coverage-gcc/html/
          retention-days: 7
